name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'fetch-mcp-demo/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Create .vercel/project.json
        run: |
          mkdir -p fetch-mcp-demo/.vercel
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > fetch-mcp-demo/.vercel/project.json

      - name: Deploy to Vercel
        working-directory: fetch-mcp-demo
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel --prod --yes --token=$VERCEL_TOKEN
