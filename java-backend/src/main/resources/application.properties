# ============================================
# Spring Boot 应用配置文件
# ============================================
# 这个文件类似于前端的 .env 文件，用于配置应用参数

# 服务器端口（默认 8080）
server.port=8080

# 应用名称
spring.application.name=fetch-demo

# ============================================
# SQLite 数据库配置
# ============================================
# 
# 数据库连接 URL
# jdbc:sqlite: 是 SQLite 的 JDBC 协议前缀
# ./data/app.db 是数据库文件的相对路径（相对于项目根目录）
# 
# 类比前端：就像配置 Prisma 的 DATABASE_URL
spring.datasource.url=jdbc:sqlite:./data/app.db

# JDBC 驱动类名
# 告诉 Spring 使用哪个驱动来连接数据库
spring.datasource.driver-class-name=org.sqlite.JDBC

# ============================================
# JPA/Hibernate 配置
# ============================================
#
# 数据库方言
# 方言告诉 Hibernate 如何生成特定数据库的 SQL 语句
# SQLite 有自己特殊的 SQL 语法，需要使用对应的方言
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# DDL 自动更新策略
# - none: 不做任何操作
# - validate: 只验证表结构，不修改
# - update: 自动更新表结构（添加新列，不删除旧列）
# - create: 每次启动都重新创建表（会丢失数据！）
# - create-drop: 启动时创建，关闭时删除
#
# 开发阶段用 update，生产环境用 validate 或 none
spring.jpa.hibernate.ddl-auto=update

# 显示 SQL 语句（学习时开启，生产环境关闭）
# 开启后可以在控制台看到 Hibernate 生成的 SQL
spring.jpa.show-sql=true

# 格式化 SQL 输出（让 SQL 更易读）
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# 日志配置
# ============================================
# TRACE < DEBUG < INFO < WARN < ERROR
logging.level.root=INFO
logging.level.com.example=DEBUG

# 显示 SQL 参数值（学习时有用）
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# 控制台输出彩色日志
spring.output.ansi.enabled=ALWAYS

