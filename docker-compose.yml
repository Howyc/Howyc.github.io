# 本地开发环境 Docker Compose 配置
# 使用方法：docker compose up --build
# 前端访问：http://localhost:5173
# 后端访问：http://localhost:8080

services:
  # Spring Boot 后端服务
  backend:
    build:
      context: ./java-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=default
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React + Vite 前端服务
  frontend:
    build:
      context: ./learn-fullstack
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  backend-data:
